<!DOCTYPE html>
<html lang="en" class="intro-pending">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Yabin Torres - Portfolio</title>

  <!-- Fonts -->
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=DM+Sans:wght@400;500;700&display=swap" rel="stylesheet" />
  <link rel="icon" href="assets/favicon.svg" type="image/svg+xml" />
  <link rel="stylesheet" href="css/styles.css?v=8" />
  <script src="js/home.js?v=8" defer></script>
</head>

<body>

  <!-- NAV -->
  <nav>
    <a href="/" class="nav-logo">
      <span>Yabin Torres</span>
    </a>
    <ul class="nav-links">
      <li><a href="contact.html">Contact</a></li>
    </ul>
  </nav>

  <!-- HERO -->
  <section class="hero">
    <div class="hero-network" aria-label="Design practice network">
      <svg class="network-lines" viewBox="0 0 100 100" preserveAspectRatio="none" aria-hidden="true" focusable="false">
        <line id="line-ir" x1="8" y1="40" x2="82" y2="8" vector-effect="non-scaling-stroke" />
        <line id="line-ib" x1="8" y1="40" x2="74" y2="80" vector-effect="non-scaling-stroke" />
        <line id="line-rb" x1="82" y1="8" x2="74" y2="80" vector-effect="non-scaling-stroke" />
        <line id="line-bi" x1="8" y1="40" x2="40" y2="92" vector-effect="non-scaling-stroke" />
        <line id="line-bb" x1="74" y1="80" x2="40" y2="92" vector-effect="non-scaling-stroke" />
      </svg>
      <div class="network-node network-node-industrial" data-node="industrial">
        <span class="node-label">Product design</span>
      </div>
      <div class="network-node network-node-research" data-node="research">
        <span class="node-label">UX</span>
      </div>
      <div class="network-node network-node-interface" data-node="interface">
        <span class="node-label">UI</span>
      </div>
      <div class="network-node network-node-branding" data-node="branding">
        <span class="node-label">Branding</span>
      </div>
    </div>
  </section>

  <!-- WORKS / FOOTER -->
  <footer class="works" id="work">

    <!-- TABLE HEADER -->
    <div class="project-list-header">
      <span>Date</span>
      <span>Project</span>
      <span>Category</span>
      <span>Client</span>
      <span></span>
    </div>

    <!-- PROJECT LIST -->
    <ul class="project-list" id="project-list">

      <li class="project-item" data-category="product" onclick="location.href='cases/resilienciaenuncaja.html'">
        <span class="project-year">2025</span>
        <span class="project-title">Resliencia en una Caja</span>
        <span class="project-cat">UX/UI Design</span>
        <span class="project-tags">CENACED</span>
        <div class="project-cta">Read Case Study</div>
      </li>

    </ul>
  </footer>

</body>
</html>
